<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - CyberTamimTech</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================================================
           Global & Theme Variables
           ======================================================================== */
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f3f4f6;
            --surface-color: #ffffff;
            --text-color: #1f2937;
            --text-secondary: #6b7280;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* ========================================================================
           Login Page Styles
           ======================================================================== */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .login-container h1 {
            color: var(--primary-color);
            font-size: 2.2rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .login-btn:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
        }

        #login-error {
            color: #ef4444;
            margin-top: 15px;
            display: none; /* Initially hidden */
        }
        
        /* ========================================================================
           Dashboard Page Styles
           ======================================================================== */
        .dashboard-page {
            display: none; /* Initially hidden */
        }
        
        .dashboard-header {
            background-color: var(--surface-color);
            padding: 20px 40px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }
        
        .dashboard-header h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .logout-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .logout-btn:hover {
            background-color: #dc2626;
        }

        .dashboard-content {
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background-color: var(--surface-color);
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .card h2 {
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .save-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .save-btn:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body>
    <div id="loginPage" class="login-page">
        <div class="login-container">
            <h1>Admin Login</h1>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Log In</button>
                <p id="login-error">Invalid username or password.</p>
            </form>
        </div>
    </div>
    
    <div id="dashboardPage" class="dashboard-page">
        <div class="dashboard-header">
            <h1>Admin Dashboard</h1>
            <button id="logoutBtn" class="logout-btn">Log Out</button>
        </div>

        <div class="dashboard-content">
            <div class="card">
                <h2>Personal Information</h2>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" value="Abid Al Hasan Tamim">
                </div>
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" value="Web Developer | Ethical Hacker | Learner">
                </div>
                <button class="save-btn">Save Changes</button>
            </div>

            <div class="card">
                <h2>Skills</h2>
                <div class="form-group">
                    <label for="html-skill">HTML (%)</label>
                    <input type="number" id="html-skill" value="90">
                </div>
                <div class="form-group">
                    <label for="css-skill">CSS (%)</label>
                    <input type="number" id="css-skill" value="85">
                </div>
                <button class="save-btn">Update Skills</button>
            </div>
        </div>
    </div>

    <script>
        const loginPage = document.getElementById('loginPage');
        const dashboardPage = document.getElementById('dashboardPage');
        const loginForm = document.getElementById('loginForm');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginError = document.getElementById('login-error');

        // Hardcoded credentials for this demo. NOT SECURE for real websites.
        const correctUsername = "admin";
        const correctPassword = "password";

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); // Prevent form from submitting normally

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            if (usernameInput === correctUsername && passwordInput === correctPassword) {
                // Successful login
                loginPage.style.display = 'none';
                dashboardPage.style.display = 'block';
                loginError.style.display = 'none'; // Hide any previous error
            } else {
                // Failed login
                loginError.style.display = 'block';
            }
        });

        logoutBtn.addEventListener('click', () => {
            // Log out
            dashboardPage.style.display = 'none';
            loginPage.style.display = 'flex';
            loginForm.reset(); // Clear the form fields
        });
    </script>

</body>
  </html>
